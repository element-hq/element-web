name: Build element-tor

on:
  push:
    branches: [feature/tor-integration]
  release:
    types: [created]
  workflow_dispatch:  # allows manual trigger from GitHub UI

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            platform: linux
            arch: x64
            target: linux-x64
          - os: macos-latest
            platform: mac
            arch: x64
            target: mac-x64
          - os: macos-latest
            platform: mac
            arch: arm64
            target: mac-arm64
          - os: windows-latest
            platform: win
            arch: x64
            target: win-x64

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Install dependencies
        run: pnpm install

      - name: Extract Tor binaries
        shell: bash
        run: |
          TARGET=${{ matrix.target }} bash apps/desktop/scripts/extract-tor.sh

      - name: Build webapp
        run: pnpm --filter element-web build

      - name: Create webapp.asar
        working-directory: apps/desktop
        shell: bash
        run: |
          cp -r ../web/webapp .
          pnpm asar-webapp

      - name: Build Electron app (Linux)
        if: matrix.platform == 'linux'
        working-directory: apps/desktop
        run: pnpm electron-builder --linux --x64 --publish never

      - name: Build Electron app (macOS x64)
        if: matrix.platform == 'mac' && matrix.arch == 'x64'
        working-directory: apps/desktop
        run: pnpm electron-builder --mac --x64 --publish never

      - name: Build Electron app (macOS arm64)
        if: matrix.platform == 'mac' && matrix.arch == 'arm64'
        working-directory: apps/desktop
        run: pnpm electron-builder --mac --arm64 --publish never

      - name: Build Electron app (Windows)
        if: matrix.platform == 'win'
        working-directory: apps/desktop
        run: pnpm electron-builder --win --x64 --publish never

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: element-tor-${{ matrix.target }}
          path: |
            apps/desktop/dist/*.AppImage
            apps/desktop/dist/*.deb
            apps/desktop/dist/*.rpm
            apps/desktop/dist/*.dmg
            apps/desktop/dist/*.exe
            apps/desktop/dist/*.zip
          retention-days: 30