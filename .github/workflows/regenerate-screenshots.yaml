name: Regenerate Playwright Screenshots
on:
    workflow_dispatch:
        inputs:
            ref:
                description: "Branch to regenerate screenshots for"
                required: false
                default: "develop"
            grep:
                description: "Test filter (grep pattern) - defaults to all @screenshot tests"
                required: false
                default: "@screenshot"
            commit-message:
                description: "Commit message"
                required: false
                default: "Update Playwright screenshots"

env:
    NX_DEFAULT_OUTPUT_STYLE: stream-without-prefixes

jobs:
    regenerate-screenshots:
        name: "Regenerate Screenshots"
        runs-on: ubuntu-24.04
        permissions:
            actions: read
            contents: write
        steps:
            - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
              with:
                  ref: ${{ inputs.ref }}

            - uses: pnpm/action-setup@fc06bc1257f339d1d5d8b3a19a8cae5388b55320 # v5
            - uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6
              with:
                  cache: "pnpm"
                  node-version: "lts/*"

            - name: Install dependencies
              run: pnpm install --frozen-lockfile

            - name: Copy config
              working-directory: apps/web
              run: cp element.io/develop/config.json config.json

            - name: Build Element Web
              env:
                  CI_PACKAGE: true
              working-directory: apps/web
              run: VERSION=$(scripts/get-version-from-git.sh) pnpm run build

            - name: Regenerate screenshots
              working-directory: apps/web
              run: pnpm run test:playwright:screenshots -- --grep "${{ inputs.grep }}"

            - name: Check for changes
              id: git-check
              run: |
                  if ! git diff --quiet -- apps/web/playwright/snapshots/; then
                      echo "changes=true" >> $GITHUB_OUTPUT
                  fi

            - name: Commit and push changes
              if: steps.git-check.outputs.changes == 'true'
              run: |
                  git config user.name "github-actions[bot]"
                  git config user.email "github-actions[bot]@users.noreply.github.com"
                  git add apps/web/playwright/snapshots/
                  git commit -m "${{ inputs.commit-message }}"
                  git push origin HEAD:${{ inputs.ref }}

            - name: No changes detected
              if: steps.git-check.outputs.changes != 'true'
              run: echo "No screenshot changes detected."
